<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAPE LUXE | Premium Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ffcc; --dark: #1a1a1a; --secondary: #252525; --transition: all 0.3s ease; }
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        
        body { 
            background-color: var(--dark); 
            color: white; 
            font-family: 'Montserrat', sans-serif; 
            /* FOND MODIFIÉ : Gris anthracite avec dégradé */
            background: radial-gradient(circle at center, #2c3e50 0%, #000000 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* --- NAVIGATION --- */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 8%; position: fixed; width: 100%; z-index: 1000; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-weight: 900; font-size: 1.5rem; letter-spacing: 3px; color: white; text-decoration: none; }
        .logo span { color: var(--primary); }
        .cta-cart { background: var(--primary); color: black; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: 900; font-size: 0.8rem; }

        /* --- HERO --- */
        section { padding: 100px 8%; }
        .hero { height: 100vh; display: flex; align-items: center; position: relative; overflow: hidden; }
        .hero-text { flex: 1; z-index: 10; }
        h1 { font-size: 4rem; line-height: 1; margin-bottom: 20px; text-shadow: 0 0 20px rgba(0,255,204,0.3); }
        #container-3d { position: absolute; right: 0; width: 55%; height: 100%; cursor: grab; }

        /* --- PRODUITS --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; margin-top: 50px; }
        .card { background: var(--secondary); padding: 25px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); text-align: center; transition: var(--transition); }
        .card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card img { width: 100%; border-radius: 10px; margin-bottom: 20px; height: 200px; object-fit: cover; }
        .price { color: var(--primary); font-size: 1.5rem; font-weight: 900; margin: 15px 0; }
        .btn-add { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--primary); color: white; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-add:hover { background: var(--primary); color: black; }

        /* --- PANIER (MODIFIABLE) --- */
        .cart-sidebar { position: fixed; right: -450px; top: 0; width: 400px; height: 100%; background: #111; padding: 40px; z-index: 2000; transition: 0.5s; border-left: 2px solid var(--primary); display: flex; flex-direction: column; }
        .cart-sidebar.open { right: 0; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #222; }
        .remove-btn { color: #ff4d4d; cursor: pointer; font-size: 0.8rem; text-transform: uppercase; border: none; background: none; font-weight: 900; }
        .cart-footer { margin-top: auto; padding-top: 20px; border-top: 2px solid #222; }
        .btn-pay { width: 100%; padding: 20px; background: var(--primary); border: none; color: black; font-weight: 900; font-size: 1rem; cursor: pointer; border-radius: 5px; margin-top: 20px; }
        .btn-pay:hover { background: #00ccaa; box-shadow: 0 0 20px var(--primary); }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            #container-3d { width: 100%; height: 50%; bottom: 0; }
            .hero { flex-direction: column; text-align: center; }
            .cart-sidebar { width: 100%; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">VAPE<span>LUXE</span></a>
        <div class="cta-cart" onclick="toggleCart()">PANIER (<span id="cart-count">0</span>)</div>
    </nav>

    <section class="hero" id="hero">
        <div class="hero-text">
            <h1>L'ÉLÉGANCE<br>À CHAQUE BOUFFÉE.</h1>
            <p>Découvrez nos technologies de chauffe brevetées.</p>
        </div>
        <div id="container-3d"></div>
    </section>

    <section id="shop">
        <h2 style="text-align: center; font-size: 2.5rem; margin-bottom: 40px;">LA <span>BOUTIQUE</span></h2>
        <div class="grid">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1631557005481-6f0920409a06?w=400" alt="Vape 1">
                <h3>MODÈLE X COBALT</h3>
                <p class="price">69.90 €</p>
                <button class="btn-add" onclick="addToCart('Modèle X', 69.90)">AJOUTER</button>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1606113264427-4663d28bd726?w=400" alt="Vape 2">
                <h3>MODÈLE S ONYX</h3>
                <p class="price">89.90 €</p>
                <button class="btn-add" onclick="addToCart('Modèle S', 89.90)">AJOUTER</button>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1552835011-094e637889cc?w=400" alt="Liquid">
                <h3>MENTHE GLACIALE</h3>
                <p class="price">18.90 €</p>
                <button class="btn-add" onclick="addToCart('Menthe Glaciale', 18.90)">AJOUTER</button>
            </div>
        </div>
    </section>

    <div id="cart-sidebar" class="cart-sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2>MON PANIER</h2>
            <span onclick="toggleCart()" style="cursor:pointer; font-size: 2rem;">&times;</span>
        </div>
        <div id="cart-items">
            </div>
        <div class="cart-footer">
            <div style="display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: 900;">
                <span>TOTAL :</span>
                <span><span id="cart-total">0.00</span> €</span>
            </div>
            <button class="btn-pay" onclick="goToPayment()">PASSER AU PAIEMENT</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- 3D INTERACTIF ---
        let scene, camera, renderer, vape;
        const container = document.querySelector('#container-3d');

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, container.offsetWidth / container.offsetHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.offsetWidth, container.offsetHeight);
            container.appendChild(renderer.domElement);

            const geometry = new THREE.CylinderGeometry(0.5, 0.5, 4, 32);
            const material = new THREE.MeshPhongMaterial({ color: 0x333333, shininess: 100, specular: 0x00ffcc });
            vape = new THREE.Mesh(geometry, material);
            scene.add(vape);

            const light = new THREE.DirectionalLight(0xffffff, 1.5);
            light.position.set(5, 5, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            camera.position.z = 5;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(vape) vape.rotation.y += 0.01;
            renderer.render(scene, camera);
        }

        // --- LOGIQUE PANIER ---
        let cart = [];

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('open');
        }

        function addToCart(name, price) {
            cart.push({ id: Date.now(), name: name, price: price });
            updateCartUI();
            if(!document.getElementById('cart-sidebar').classList.contains('open')) toggleCart();
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            const countLabel = document.getElementById('cart-count');
            const totalLabel = document.getElementById('cart-total');
            
            container.innerHTML = "";
            let total = 0;

            cart.forEach(item => {
                total += item.price;
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <div>
                        <p style="font-weight:700;">${item.name}</p>
                        <p style="color:var(--primary); font-size:0.9rem;">${item.price.toFixed(2)} €</p>
                    </div>
                    <button class="remove-btn" onclick="removeFromCart(${item.id})">Supprimer</button>
                `;
                container.appendChild(div);
            });

            countLabel.innerText = cart.length;
            totalLabel.innerText = total.toFixed(2);
        }

        function goToPayment() {
            if(cart.length === 0) {
                alert("Votre panier est vide !");
                return;
            }
            alert("Redirection sécurisée vers la plateforme de paiement Stripe / PayPal...");
            // Ici tu pourrais mettre : window.location.href = "ta-page-de-paiement.html";
        }

        init3D();
        window.addEventListener('resize', () => {
            camera.aspect = container.offsetWidth / container.offsetHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.offsetWidth, container.offsetHeight);
        });
    </script>
</body>
</html>
